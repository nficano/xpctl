name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install debaser
        shell: bash
        run: |
          set -euo pipefail
          repo="nficano/debaser"
          version="$(python scripts/release_info.py latest-github-release-tag "${repo}")"
          target="x86_64-unknown-linux-gnu"
          asset="debaser-${version}-${target}.tar.gz"
          base="https://github.com/${repo}/releases/download/${version}"
          curl -fsSL "$base/$asset" -o "$asset"
          tar -xzf "$asset"
          sudo install -m 0755 "debaser-${version}-${target}/debaser" /usr/local/bin/debaser

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          package_version="$(python scripts/release_info.py package-version)"
          if [[ "$tag" != "$package_version" ]]; then
            echo "Tag version ($tag) does not match package version ($package_version)" >&2
            exit 1
          fi

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: twine check dist/*

      - name: Generate release name
        id: debaser
        shell: bash
        run: |
          set -euo pipefail
          name="$(debaser --checksum "${GITHUB_SHA}")"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }} (${{ steps.debaser.outputs.name }})"
          body: |
            Release name: `${{ steps.debaser.outputs.name }}`

            This release was built from `${{ github.sha }}` and published automatically.
          files: dist/*
