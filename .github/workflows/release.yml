name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      (github.ref == 'refs/heads/main' &&
      !startsWith(github.event.head_commit.message, 'Release v'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install debaser
        shell: bash
        run: |
          set -euo pipefail
          repo="nficano/debaser"
          version="$(python scripts/release_info.py latest-github-release-tag "${repo}")"
          target="x86_64-unknown-linux-gnu"
          asset="debaser-${version}-${target}.tar.gz"
          base="https://github.com/${repo}/releases/download/${version}"
          curl -fsSL "$base/$asset" -o "$asset"
          tar -xzf "$asset"
          sudo install -m 0755 "debaser-${version}-${target}/debaser" /usr/local/bin/debaser

      - name: Bump version, tag, and push
        id: bump
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          output="$(python scripts/release.py --bump patch --no-push)"
          version="$(echo "$output" | grep '^version=' | cut -d= -f2)"
          release_name="$(echo "$output" | grep '^release_name=' | cut -d= -f2)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          git push origin main "v${version}"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          package_version="$(python scripts/release_info.py package-version)"
          if [[ "$tag" != "$package_version" ]]; then
            echo "Tag version ($tag) does not match package version ($package_version)" >&2
            exit 1
          fi

      - name: Derive release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          commit="$(git rev-parse HEAD)"
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            tag="v${{ steps.bump.outputs.version }}"
            name="${{ steps.bump.outputs.release_name }}"
          else
            tag="${GITHUB_REF_NAME}"
            name="$(debaser --checksum "${commit}")"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.release_meta.outputs.tag }}"
          name: "${{ steps.release_meta.outputs.tag }} (${{ steps.release_meta.outputs.name }})"
          body: |
            Release name: `${{ steps.release_meta.outputs.name }}`

            This release was built from `${{ steps.release_meta.outputs.commit }}` and published automatically.
          files: dist/*
